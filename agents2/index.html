<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Citizen Digital Seva</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --accent:#4fffb0; --accent-dim:#1adb7a;
  --bg:#0a0f1a; --bg2:#111827; --bg3:#1a2235; --card:#141e2e;
  --border:rgba(255,255,255,0.08);
  --text:#e8edf5; --text2:#8899aa;
  --radius:14px; --shadow:0 4px 24px rgba(0,0,0,0.4);
  --font-te:'Noto Sans Telugu',sans-serif;
  --font:'Inter',sans-serif;
  --trans:0.25s cubic-bezier(0.19,1,0.22,1);
}
.gi-blue   {--ci:#60a5fa;--cb:rgba(96,165,250,0.12)}
.gi-green  {--ci:#34d399;--cb:rgba(52,211,153,0.12)}
.gi-orange {--ci:#fb923c;--cb:rgba(251,146,60,0.12)}
.gi-purple {--ci:#a78bfa;--cb:rgba(167,139,250,0.12)}
.gi-red    {--ci:#f87171;--cb:rgba(248,113,113,0.12)}
.gi-yellow {--ci:#fbbf24;--cb:rgba(251,191,36,0.12)}
.gi-pink   {--ci:#f472b6;--cb:rgba(244,114,182,0.12)}
.gi-teal   {--ci:#2dd4bf;--cb:rgba(45,212,191,0.12)}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{border:none;cursor:pointer;font-family:var(--font)}

/* LOADING */
#loading-screen{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;transition:opacity 0.5s ease
}
#loading-screen.hide{opacity:0;pointer-events:none}
.loader-ring{
  width:52px;height:52px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.8s linear infinite
}
.loader-text{color:var(--text2);font-size:14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* POPUP */
#popup-overlay{
  position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  padding:16px;animation:fadeIn 0.3s ease
}
#popup-overlay.hidden{display:none}
#popup-box{
  background:var(--bg2);border:1px solid var(--accent);
  border-radius:var(--radius);max-width:440px;width:100%;
  box-shadow:0 0 40px rgba(79,255,176,0.2);overflow:hidden;
  animation:slideUp 0.35s cubic-bezier(0.19,1,0.22,1)
}
#popup-img{width:100%;max-height:none;object-fit:contain;display:none;background:#000}
#popup-img.show{display:block}
.popup-body{padding:24px;display:flex;flex-direction:column;gap:12px}
.popup-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(79,255,176,0.12);color:var(--accent);
  border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;width:fit-content
}
.popup-badge i{font-size:10px}
.popup-counter{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.06);color:var(--text2);
  border-radius:20px;padding:3px 10px;font-size:11px;width:fit-content;margin-left:8px
}
#popup-title{font-size:18px;font-weight:700;line-height:1.4;font-family:var(--font-te)}
#popup-subtitle{font-size:14px;color:var(--text2);line-height:1.6;font-family:var(--font-te)}
#popup-close{
  background:var(--accent);color:#0a0f1a;border-radius:8px;
  padding:10px 20px;font-weight:700;font-size:14px;margin-top:4px;
  transition:var(--trans);font-family:var(--font-te)
}
#popup-close:hover{opacity:0.85;transform:scale(0.98)}

/* ── FIX 1: Ticker speed 22s (was 1s — unreadable) ── */
#ticker-bar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 16px;display:flex;align-items:center;gap:12px;
  height:38px;overflow:hidden;position:sticky;top:0;z-index:50
}
.ticker-label{
  background:var(--accent);color:#0a0f1a;border-radius:4px;
  padding:2px 8px;font-size:11px;font-weight:700;
  white-space:nowrap;flex-shrink:0;letter-spacing:0.5px
}
.ticker-track{flex:1;overflow:hidden;position:relative}
.ticker-inner{
  display:flex;gap:48px;
  animation:tickerScroll 22s linear infinite; /* FIX: was 1s */
  white-space:nowrap
}
.ticker-inner:hover{animation-play-state:paused}
.ticker-item{
  font-size:13px;color:var(--text2);flex-shrink:0;cursor:pointer;
  font-family:var(--font-te);transition:color var(--trans)
}
.ticker-item:hover{color:var(--accent)}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* HEADER */
#app-header{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:64px
}
.header-brand{display:flex;align-items:center;gap:12px}
.header-logo{
  width:42px;height:42px;background:rgba(79,255,176,0.12);
  border:1.5px solid var(--accent);border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:18px
}
.header-name{font-size:16px;font-weight:700;font-family:var(--font-te)}
.header-tag{font-size:11px;color:var(--text2);margin-top:1px}
.header-actions{display:flex;gap:8px}
.hbtn{
  width:38px;height:38px;border-radius:10px;background:var(--bg3);
  color:var(--text2);display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:var(--trans)
}
.hbtn:hover{background:var(--card);color:var(--text)}

.page{display:none}
.page.active{display:block}

/* HOME */
#home{padding:0 0 100px;max-width:600px;margin:0 auto}
/* ── Facebook Profile Banner Hero ── */
.hero-card{
  border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:24px;overflow:hidden;background:var(--card)
}
.hero-cover{
  width:100%;height:160px;position:relative;
  background:linear-gradient(135deg,#0d2137 0%,#1a3a5c 50%,#0d2137 100%);
  overflow:hidden
}
.hero-cover-img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:opacity 0.4s ease
}
.hero-cover-gradient{
  position:absolute;inset:0;
  background:linear-gradient(180deg,transparent 40%,rgba(10,15,26,0.85) 100%);
  pointer-events:none
}
.hero-cover-pattern{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(79,255,176,0.08) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 20%,rgba(96,165,250,0.06) 0%,transparent 50%);
  pointer-events:none
}
/* Add cover button */
.hero-add-cover{
  position:absolute;bottom:10px;right:10px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;border-radius:8px;padding:5px 10px;
  font-size:11px;display:flex;align-items:center;gap:5px;
  cursor:pointer;transition:var(--trans)
}
.hero-add-cover:hover{background:rgba(0,0,0,0.75)}

.hero-profile-row{
  display:flex;align-items:flex-end;gap:14px;
  padding:0 16px;margin-top:-36px;position:relative;z-index:2
}
.hero-avatar{
  width:72px;height:72px;border-radius:50%;
  border:3px solid var(--bg);
  background:rgba(79,255,176,0.12);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:28px;flex-shrink:0;
  overflow:hidden;position:relative
}
.hero-avatar img{width:100%;height:100%;object-fit:cover}
.hero-avatar-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.hero-info{flex:1;padding-bottom:6px;min-width:0}
.hero-name{
  font-size:18px;font-weight:700;font-family:var(--font-te);
  line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
}
.hero-city{font-size:12px;color:var(--text2);margin-top:3px;font-family:var(--font-te)}
.hero-stats{display:flex;gap:12px;margin-top:4px}
.hero-stat{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.hero-stat i{font-size:10px;color:var(--accent)}

.hero-actions{display:flex;gap:8px;padding:12px 16px 16px}
.hero-btn{
  flex:1;padding:9px 14px;border-radius:9px;font-size:13px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:7px;transition:var(--trans)
}
.hero-btn.primary{background:var(--accent);color:#0a0f1a}
.hero-btn.primary:hover{opacity:0.88;transform:scale(0.98)}
.hero-btn.secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.hero-btn.secondary:hover{border-color:var(--accent);color:var(--accent)}

/* ═══════════════════════════════════════
   BANNER CAROUSEL
   ═══════════════════════════════════════ */
#banner-section{display:none;margin:0 0 20px;position:relative}
.banner-track{
  border-radius:var(--radius);overflow:hidden;
  border:1px solid var(--border);
  background:var(--card);position:relative
}
.banner-slides{
  display:flex;
  transition:transform 0.5s cubic-bezier(0.19,1,0.22,1);
  will-change:transform
}
.banner-slide{
  min-width:100%;position:relative;
  aspect-ratio:16/6.5;cursor:pointer;flex-shrink:0;
  background:var(--bg3)
}
.banner-slide img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:opacity 0.3s
}
.banner-slide-fallback{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:8px;color:var(--text2)
}
.banner-caption{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(0,0,0,0.75));
  padding:28px 14px 10px;
  font-size:13px;font-family:var(--font-te);
  color:#fff;line-height:1.4;
  pointer-events:none
}
/* Dot indicators */
.banner-dots{
  position:absolute;bottom:10px;right:12px;
  display:flex;gap:5px;align-items:center;z-index:2
}
.bdot{
  height:6px;border-radius:3px;
  background:rgba(255,255,255,0.35);
  cursor:pointer;transition:all 0.35s;
  border:none;padding:0
}
.bdot.on{background:var(--accent);width:18px}
.bdot:not(.on){width:6px}
/* Prev / Next arrows */
.banner-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  width:30px;height:30px;border-radius:50%;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-size:12px;z-index:2;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:var(--trans)
}
.banner-arrow:hover{background:rgba(0,0,0,0.75);border-color:var(--accent)}
.banner-arrow.prev{left:10px}
.banner-arrow.next{right:10px}

.section-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.section-head h2{font-size:15px;font-weight:700;font-family:var(--font-te)}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border) 0%,transparent 100%)}

.updates-section{margin-bottom:24px}
.updates-scroll-wrap{
  max-height:500px;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent
}
.updates-scroll-wrap::-webkit-scrollbar{width:4px}
.updates-scroll-wrap::-webkit-scrollbar-track{background:transparent}
.updates-scroll-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.update-card{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;display:flex;align-items:center;gap:14px;
  margin-bottom:8px;cursor:pointer;transition:var(--trans)
}
.update-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.update-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px var(--accent)}
.update-title{flex:1;font-size:13px;font-family:var(--font-te);line-height:1.5}
.update-arrow{color:var(--text2);font-size:12px}
.updates-show-more{
  width:100%;padding:10px;border-radius:10px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-size:13px;font-family:var(--font-te);
  display:flex;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;transition:var(--trans);margin-top:4px
}
.updates-show-more:hover{border-color:var(--accent);color:var(--accent)}

.services-section{margin-bottom:24px}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.service-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px 12px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;text-align:center;cursor:pointer;
  transition:var(--trans);min-height:90px
}
.service-card:hover{
  border-color:var(--ci,var(--accent));background:var(--cb,rgba(79,255,176,0.06));
  transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3)
}
.service-icon{
  width:38px;height:38px;border-radius:10px;
  background:var(--cb,rgba(79,255,176,0.12));color:var(--ci,var(--accent));
  display:flex;align-items:center;justify-content:center;font-size:16px
}
.service-name{font-size:11px;color:var(--text2);font-family:var(--font-te);line-height:1.3}

/* DOCS */
#docs-page{padding:20px 16px 100px;max-width:600px;margin:0 auto}
.req-section{margin-top:24px}
.acc-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;margin-bottom:10px;overflow:hidden;transition:border-color 0.25s
}
.acc-item.open{border-color:rgba(79,255,176,0.3)}
.acc-header{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent
}
.acc-icon{
  width:38px;height:38px;border-radius:10px;
  background:rgba(79,255,176,0.1);border:1px solid rgba(79,255,176,0.2);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:16px;flex-shrink:0;transition:background 0.25s
}
.acc-item.open .acc-icon{background:rgba(79,255,176,0.18)}
.acc-label{flex:1;font-size:14px;font-weight:600;font-family:var(--font-te);color:var(--text);line-height:1.4}
.acc-count{font-size:11px;color:var(--text2);background:var(--bg3);border-radius:20px;padding:2px 8px;flex-shrink:0}
.acc-arrow{color:var(--text2);font-size:13px;flex-shrink:0;transition:transform 0.3s cubic-bezier(0.19,1,0.22,1)}
.acc-item.open .acc-arrow{transform:rotate(180deg);color:var(--accent)}
.acc-body{max-height:0;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.19,1,0.22,1)}
.acc-item.open .acc-body{max-height:600px}
.acc-inner{padding:4px 16px 14px 16px;border-top:1px solid var(--border)}
.req-doc-item{
  display:flex;align-items:flex-start;gap:10px;padding:9px 0;
  border-bottom:1px solid var(--border);font-family:var(--font-te);
  font-size:13.5px;color:var(--text);line-height:1.45
}
.req-doc-item:last-child{border-bottom:none}
.req-doc-bullet{
  width:22px;height:22px;border-radius:50%;
  background:rgba(79,255,176,0.1);border:1px solid rgba(79,255,176,0.25);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:9px;flex-shrink:0;margin-top:1px
}

.pdf-section{margin-bottom:24px}
.pdf-item{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;display:flex;align-items:center;gap:14px;
  margin-bottom:8px;cursor:pointer;transition:var(--trans)
}
.pdf-item:hover{border-color:#f87171}
.pdf-icon-wrap{
  width:36px;height:36px;background:rgba(248,113,113,0.12);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  color:#f87171;font-size:16px;flex-shrink:0
}
.pdf-name{flex:1;font-size:13px;font-family:var(--font-te)}
.pdf-dl{color:var(--text2);font-size:13px}

.docs-list{display:flex;flex-direction:column;gap:8px}
.doc-item{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;display:flex;align-items:center;gap:12px;
  font-family:var(--font-te);font-size:13px
}
.doc-check{
  width:20px;height:20px;border-radius:50%;
  background:rgba(79,255,176,0.12);border:1.5px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  color:var(--accent);font-size:10px;flex-shrink:0
}

/* CONTACT */
#contact-page{padding:20px 16px 100px;max-width:600px;margin:0 auto}
.contact-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.contact-row{
  padding:16px 20px;display:flex;align-items:center;gap:14px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:var(--trans)
}
.contact-row:last-child{border-bottom:none}
.contact-row:hover{background:var(--bg3)}
.contact-icon-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.contact-label{font-size:11px;color:var(--text2)}
.contact-value{font-size:14px;font-weight:600;margin-top:2px}
.map-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);height:240px;margin-bottom:16px}
.map-wrap iframe{width:100%;height:100%;border:none}
.map-placeholder{width:100%;height:100%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text2)}

/* BOTTOM NAV */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;padding:0 0 env(safe-area-inset-bottom)
}
.nav-btn{
  flex:1;padding:10px 0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;color:var(--text2);
  background:transparent;font-size:10px;font-weight:600;
  font-family:var(--font-te);transition:var(--trans);letter-spacing:0.3px
}
.nav-btn i{font-size:18px}
.nav-btn.active{color:var(--accent)}
.nav-btn.active i{filter:drop-shadow(0 0 4px var(--accent))}

#fab{
  position:fixed;bottom:80px;right:20px;z-index:200;
  width:52px;height:52px;border-radius:50%;background:var(--accent);
  color:#0a0f1a;font-size:20px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(79,255,176,0.4);transition:var(--trans)
}
#fab:hover{transform:scale(1.08);box-shadow:0 6px 28px rgba(79,255,176,0.5)}

.page-footer{text-align:center;padding:20px 16px;color:var(--text2);font-size:12px;border-top:1px solid var(--border);margin-top:16px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ── FIX 2: Error banner (was missing show class logic) ── */
#error-banner{
  display:none;background:rgba(248,113,113,0.12);
  border:1px solid rgba(248,113,113,0.3);border-radius:10px;
  padding:12px 16px;margin:16px;color:#f87171;
  font-size:13px;font-family:var(--font-te)
}
#error-banner.show{display:block}

@media(min-width:640px){.services-grid{grid-template-columns:repeat(4,1fr)}}

/* VOICE PAGE — horizontal scroll sections */
#voice-page{padding:16px 0 100px;max-width:100%}
.vc-section{margin-bottom:28px}
.vc-section-head{
  display:flex;align-items:center;gap:10px;
  padding:0 16px;margin-bottom:12px
}
.vc-section-head h3{font-size:14px;font-weight:700;font-family:var(--font-te)}
.vc-section-count{
  font-size:11px;color:var(--text2);background:var(--bg3);
  border-radius:20px;padding:2px 8px
}
.vc-hscroll{
  display:flex;gap:12px;overflow-x:auto;
  padding:4px 16px 10px;
  scrollbar-width:none;-ms-overflow-style:none;
  scroll-snap-type:x mandatory
}
.vc-hscroll::-webkit-scrollbar{display:none}

/* AUDIO card */
.vc-audio-card{
  flex-shrink:0;width:260px;scroll-snap-align:start;
  background:var(--card);border:1px solid var(--border);

<script>
/* ═══════════════════════════════════════
   CONFIG — ఒక్క line మాత్రమే మార్చండి
   ═══════════════════════════════════════ */
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQgCCtcdcRdQYX3Zdhdc_BDmZPU2tw6tKUaUmuH8w_LobsbEOXq1LK0kbNSiPSNu0Lst1J_gKX-_GPl/pub?gid=0&single=true&output=csv';

let CLIENT = null;

/* CSV PARSER */
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = splitCSVLine(lines[i]);
    const row = {};
    headers.forEach((h, idx) => { row[h.trim()] = (vals[idx] || '').trim(); });
    rows.push(row);
  }
  return rows;
}
function splitCSVLine(line) {
  const result = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

/* BUILD CLIENT */
function buildClient(rows) {
  if (!rows.length) return null;
  const kv={}, updates=[], services=[], pdfs=[], docs=[];
  const tickers=[], announcements=[], reqServices=[], popups=[], banners=[];

  rows.forEach(r => {
    const key = (r.key||'').trim();
    if (!key) return;
    if      (key==='update')      updates.push({title:r.title||r.value, link:r.link||'#'});
    else if (key==='service')     services.push({title:r.title||r.value, page:r.link||'#', icon:r.icon||'fas fa-star', color:r.extra||'gi-blue'});
    else if (key==='pdf')         pdfs.push({title:r.title||r.value, link:r.link||'#'});
    else if (key==='doc')         docs.push(r.value||r.title);
    else if (key==='ticker')      tickers.push(r.value||r.title);
    else if (key==='voice')       announcements.push({type:'voice', title:r.title||r.value, link:r.link||'', date:r.extra||''});
    else if (key==='tts')         announcements.push({type:'tts', text:r.value||r.title, date:r.extra||''});
    else if (key==='poster')      announcements.push({type:'poster', title:r.title||'', link:r.link||'', date:r.extra||''});
    else if (key==='pdf_notice')  announcements.push({type:'pdf', title:r.title||r.value, desc:r.value||'PDF డౌన్‌లోడ్', link:r.link||'#', date:r.extra||''});
    else if (key==='canva')       announcements.push({type:'canva', title:r.title||'Canva Template', desc:r.value||'Template తెరవండి', link:r.link||'#', date:r.extra||''});
    else if (key==='req_service') reqServices.push({name:r.value||r.title, icon:r.icon||'fas fa-file-alt', docs:[]});
    else if (key==='req_doc')     { if (reqServices.length) reqServices[reqServices.length-1].docs.push(r.value||r.title); }
    else if (key==='popup')       popups.push({title:r.title||'', subtitle:r.value||'', imageUrl:r.link||''});
    else if (key==='banner')      banners.push({
      imgUrl:   r.link  || '',           // image URL
      caption:  r.title || r.value || '', // caption text
      clickUrl: r.value && r.value.startsWith('http') ? r.value : '',  // click-through URL
      duration: parseInt(r.extra) || 4000 // slide duration ms
    });
    else                          kv[key]=r.value;
  });

  return {
    shopName:kv.shopName||'Seva Kendra', tagline:kv.tagline||'',
    logoIcon:kv.logoIcon||'fas fa-landmark', accentColor:kv.accentColor||'#4fffb0',
    logoUrl: kv.logoUrl || '',
    city:kv.city||'', phone:kv.phone||'', whatsapp:kv.whatsapp||'',
    mapEmbedUrl:kv.mapEmbedUrl||'', footerText:kv.footerText||'',
    popups, updates, services, pdfs, docs, tickers, announcements, reqServices, banners,
    coverUrl: kv.coverUrl || '',
  };
}

/* FETCH — 3 proxy fallbacks */
async function loadData() {
  const proxies = [
    u => u,
    u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
    u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  ];
  for (const proxy of proxies) {
    try {
      const res = await fetch(proxy(SHEET_URL), {cache:'no-store'});
      if (!res.ok) throw new Error('HTTP '+res.status);
      const buf = await res.arrayBuffer();
      let text  = new TextDecoder('utf-8').decode(buf);
      if (text.charCodeAt(0)===0xFEFF) text=text.slice(1);
      if (!text.includes(',') && !text.includes('\t')) throw new Error('Not CSV');
      const rows = parseCSV(text);
      CLIENT = buildClient(rows);
      if (!CLIENT) throw new Error('No data');
      renderAll();
      return;
    } catch(e) { console.warn('proxy failed:',e.message); }
  }
  document.getElementById('error-banner').classList.add('show');
  hideLoader();
}

/* RENDER ALL */
function renderAll() {
  applyTheme(); renderHeader(); renderTicker();
  renderHero(); renderBanner(); renderUpdates(); renderServices();
  renderPDFs(); renderDocs(); renderReqDocs();
  renderVoice(); renderContact(); renderFooter();
  showPopup(); hideLoader();
}

/* ── FIX 5: hideLoader — was MISSING, caused infinite loading screen ── */
function hideLoader() {
  const s = document.getElementById('loading-screen');
  s.classList.add('hide');
  setTimeout(() => { s.style.display='none'; }, 500);
}

function applyTheme() {
  document.documentElement.style.setProperty('--accent', CLIENT.accentColor);
}

function renderHeader() {
  document.getElementById('hdr-name').textContent = CLIENT.shopName;
  document.getElementById('hdr-tag').textContent  = CLIENT.tagline;
  document.getElementById('fab-call').href = 'tel:'+CLIENT.phone;
  document.getElementById('fab-wa').href   = 'https://wa.me/'+CLIENT.whatsapp;
  document.getElementById('fab').href      = 'https://wa.me/'+CLIENT.whatsapp;
  document.title = CLIENT.shopName;

  const hdrImg  = document.getElementById('hdr-logo-img');
  const hdrIcon = document.getElementById('hdr-icon');
  if (CLIENT.logoUrl) {
    hdrImg.src          = CLIENT.logoUrl;
    hdrImg.style.display = 'block';
    hdrIcon.style.display = 'none';
  } else {

/* ═══════════════════════════════════════════════════
   BANNER CAROUSEL
   Sheet key: 'banner'
   link  = image URL
   title = caption text (optional)
   value = click-through URL (optional, must start with http)
   extra = slide duration ms (optional, default 4000)
   ═══════════════════════════════════════════════════ */
let _bannerCur = 0, _bannerTimer = null;

function renderBanner() {
  const banners = CLIENT.banners || [];
  if (!banners.length) return;

  const sec    = document.getElementById('banner-section');
  const slides = document.getElementById('banner-slides');
  const dots   = document.getElementById('banner-dots');
  const prev   = document.getElementById('banner-prev');
  const next   = document.getElementById('banner-next');

  sec.style.display = 'block';

  // Build slides
  slides.innerHTML = banners.map((b, i) => `
    <div class="banner-slide" ${b.clickUrl ? `onclick="safeOpen('${b.clickUrl}')" style="cursor:pointer"` : ''}>
      <img src="${b.imgUrl}" alt="${b.caption}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="banner-slide-fallback" style="display:none">
        <i class="fas fa-image" style="font-size:28px;opacity:.3"></i>
        <span style="font-size:12px;font-family:var(--font-te)">${b.caption||'Image'}</span>
      </div>
      ${b.caption ? `<div class="banner-caption">${b.caption}</div>` : ''}
    </div>`).join('');

  // Build dots
  if (banners.length > 1) {
    dots.innerHTML = banners.map((_,i) =>
      `<button class="bdot${i===0?' on':''}" onclick="bannerGo(${i})"></button>`
    ).join('');
    prev.style.display = next.style.display = 'flex';
  } else {
    prev.style.display = next.style.display = 'none';
  }

  // Add touch/swipe support
  let touchX = 0;
  slides.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, {passive:true});
  slides.addEventListener('touchend',   e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) bannerGo(_bannerCur + (dx < 0 ? 1 : -1));
  }, {passive:true});

  // Start auto-slide
  bannerGo(0);
}

window.bannerGo = function(n) {
  const banners = CLIENT.banners || [];
  if (!banners.length) return;
  _bannerCur = ((n % banners.length) + banners.length) % banners.length;
  document.getElementById('banner-slides').style.transform =
    `translateX(-${_bannerCur * 100}%)`;
  document.querySelectorAll('.bdot').forEach((d,i) =>
    d.classList.toggle('on', i === _bannerCur));
  // Reset auto-slide timer
  clearInterval(_bannerTimer);
  if (banners.length > 1) {
    const dur = banners[_bannerCur].duration || 4000;
    _bannerTimer = setInterval(() => bannerGo(_bannerCur + 1), dur);
  }
};

    return;
  }
  const LIMIT = 10;
  const cardsHTML = u => `
    <div class="update-card" onclick="safeOpen('${u.link}')">
      <div class="update-dot"></div>
      <div class="update-title">${u.title}</div>
      <i class="fas fa-chevron-right update-arrow"></i>
    </div>`;

  if (updates.length <= LIMIT) {
    // ≤10: show all without scroll container
    list.innerHTML = updates.map(cardsHTML).join('');
  } else {

    list.innerHTML = visible.map(cardsHTML).join('') + `
      <div id="updates-more" class="updates-scroll-wrap" style="display:none">${restHTML}</div>
      <button class="updates-show-more" onclick="toggleMoreUpdates(this,${rest.length})">

  }
}

/* ── FIX 8: popup counter — show correct "1/3" on first popup ── */
function showPopup() {
  const popups = CLIENT.popups||[];
  if (!popups.length) return;
  let idx=0;
  const total=popups.length;

  function show() {
    const p = popups[idx];
    const img = document.getElementById('popup-img');
    document.getElementById('popup-title').textContent    = p.title;
    document.getElementById('popup-subtitle').textContent = p.subtitle;
    img.src = p.imageUrl||'';
    p.imageUrl ? img.classList.add('show') : img.classList.remove('show');

    const counter = document.getElementById('popup-counter');
    if (total>1) {
      counter.textContent = (idx+1)+' / '+total; /* FIX: idx+1 not idx (was showing 0/N) */
      counter.style.display='inline-flex';
    } else {
      counter.style.display='none';
    }
    const isLast = idx===total-1;
    document.getElementById('popup-close').textContent =
      isLast ? 'అర్థమైంది ✓' : 'తదుపరి → ('+(idx+1)+'/'+total+')';
    document.getElementById('popup-overlay').classList.remove('hidden');
  }

  function next() {
    document.getElementById('popup-overlay').classList.add('hidden');
    idx++;
    if (idx < total) setTimeout(show, 350);
  }

  document.getElementById('popup-close').onclick = next;
  document.getElementById('popup-overlay').onclick = e => {
    if (e.target===document.getElementById('popup-overlay')) next();
  };
  show();
}

/* VOICE — horizontal scroll sections by type */
function renderVoice() {
  const wrap = document.getElementById('voice-sections');
  const items = CLIENT.announcements||[];
  if (!items.length) return;

  const today = new Date().toLocaleDateString('te-IN',{day:'2-digit',month:'short'});
  const DELAYS = [0,0.055,0.11,0.165,0.22,0.275,0.33,0.385,0.44,0.495,0.55,0.605,0.66,0.715];
  const HEIGHTS= [6,12,18,8,20,10,16,5,14,9,17,7,13,11];
  const bars = HEIGHTS.map((h,b)=>
    `<div class="wbar" style="height:${4+h}px;--wd:${DELAYS[b]}s"></div>`).join('');

  // Group by type preserving order
  const groups = { voice:[], poster:[], pdf:[], canva:[], tts:[] };
  const ORDER  = ['voice','poster','pdf','canva','tts'];
  const LABELS = {
    voice:  ['🎙️ వాయిస్ అనౌన్స్‌మెంట్స్', 'fas fa-headphones'],
    poster: ['🖼️ పోస్టర్లు',                'fas fa-image'],
    pdf:    ['📄 PDF నోటీసులు',             'fas fa-file-pdf'],
    canva:  ['🎨 Canva Templates',          'fas fa-palette'],
    tts:    ['📢 టెక్స్ట్ నోటీసులు',        'fas fa-volume-up'],
  };

  let ai = 0;
  items.forEach(item => { if (groups[item.type]) groups[item.type].push({...item, _ai: item.type==='voice'?ai++:0}); });

  let html = '';
  ORDER.forEach(type => {
    const list = groups[type];
    if (!list.length) return;
    const [label] = LABELS[type];
    let cardsHTML = '';

    if (type === 'voice') {
      let vi = 0;
      list.forEach(item => {
        const id = 'vc_'+vi++;
        const dt = item.date||today;
        cardsHTML += `<div class="vc-audio-card">
          <div class="vc-sender"><i class="fas fa-headphones"></i> ${dt}</div>
          <div class="vc-title">${item.title||'Audio Message'}</div>
          <div class="vc-controls">
            <button class="vc-play-btn" id="pb_${id}" onclick="vcToggle('${id}',this)"><i class="fas fa-play"></i></button>
            <div class="vc-wave" id="wv_${id}">${bars}</div>
            <span class="vc-dur" id="du_${id}">0:00</span>
          </div>
          <audio id="${id}" src="${item.link}" preload="metadata"></audio>
        </div>`;
      });
    } else if (type === 'poster') {
      list.forEach(item => {
        const dt = item.date||today;
        cardsHTML += `<div class="vc-poster-card" onclick="vcLightbox('${item.link}')">
          <img src="${item.link}" alt="poster"
            onerror="this.style.background='var(--bg3)';this.style.height='160px'"/>
          ${item.title?`<div class="vc-cap">${item.title}<br><span style="color:var(--accent);font-size:10px">${dt}</span></div>`:`<div class="vc-cap" style="color:var(--accent);font-size:10px">${dt}</div>`}
        </div>`;
      });
    } else if (type === 'pdf') {
      list.forEach(item => {
        const dt = item.date||today;
        cardsHTML += `<a class="vc-pdf-hcard" href="${item.link}" target="_blank" rel="noopener">
          <div class="ico"><i class="fas fa-file-pdf"></i></div>
          <div>
            <div class="nm">${item.title}</div>
            <div class="sub">${item.desc||'PDF డౌన్‌లోడ్'}</div>
          </div>
          <div class="dl"><i class="fas fa-download"></i> Download &nbsp;<span style="color:var(--text2)">${dt}</span></div>
        </a>`;
      });
    } else if (type === 'canva') {
      list.forEach(item => {
        const dt = item.date||today;
        cardsHTML += `<a class="vc-canva-hcard" href="${item.link}" target="_blank" rel="noopener">
          <div class="ico"><i class="fas fa-object-group"></i></div>
          <div>
            <div class="nm">${item.title}</div>
            <div class="sub">${item.desc}</div>
          </div>
          <div class="open"><i class="fas fa-external-link-alt"></i> తెరవండి &nbsp;<span style="color:var(--text2);font-size:10px">${dt}</span></div>
        </a>`;
      });
    } else if (type === 'tts') {
      list.forEach(item => {
        const safe = (item.text||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        const dt = item.date||today;
        cardsHTML += `<div class="vc-tts-card">
          <div style="font-size:10px;color:var(--accent)">${dt}</div>
          <div class="tts-body">${item.text}</div>
          <button class="tts-speak-btn" onclick="vcSpeak(this,'${safe}')"><i class="fas fa-volume-up"></i> వినండి</button>
        </div>`;
      });
    }

    html += `<div class="vc-section">
      <div class="vc-section-head">
        <h3>${label}</h3>
        <span class="vc-section-count">${list.length}</span>
        <div class="section-line"></div>
      </div>
      <div class="vc-hscroll">${cardsHTML}</div>
    </div>`;
  });

  wrap.innerHTML = html || `<div class="vc-empty"><i class="fas fa-microphone-slash"></i>నోటీసులు లేవు</div>`;

  // Wire audio events
  let wi=0;
  items.forEach(item => {
    if (item.type!=='voice') return;
    const id='vc_'+wi++;
    const aud=document.getElementById(id);
    const dur=document.getElementById('du_'+id);
    if (!aud||!dur) return;
    const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
    aud.addEventListener('loadedmetadata',()=>{ if(aud.duration) dur.textContent=fmt(aud.duration); });
    aud.addEventListener('timeupdate',()=>{ dur.textContent=fmt(aud.currentTime); });
    aud.addEventListener('ended',()=>vcReset(id));
  });
}

function vcLightbox(src) {
  document.getElementById('vc-lightbox-img').src=src;
  document.getElementById('vc-lightbox').classList.add('on');
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.getElementById('vc-lightbox').classList.remove('on'); });

let _vcAud=null, _vcAudId=null;
function vcToggle(id, btn) {
  const aud=document.getElementById(id);
  const wave=document.getElementById('wv_'+id);
  if (_vcAud && _vcAud!==aud) { _vcAud.pause(); _vcAud.currentTime=0; vcReset(_vcAudId); }
  if (aud.paused) {
    aud.play().catch(()=>{});
    btn.innerHTML='<i class="fas fa-pause"></i>';
    btn.classList.add('playing');
    wave.querySelectorAll('.wbar').forEach(b=>b.classList.add('on'));
    _vcAud=aud; _vcAudId=id;
  } else {
    aud.pause(); vcReset(id);
  }
}
function vcReset(id) {
  const btn=document.getElementById('pb_'+id);
  const wave=document.getElementById('wv_'+id);
  if (btn)  { btn.innerHTML='<i class="fas fa-play"></i>'; btn.classList.remove('playing'); }
  if (wave) wave.querySelectorAll('.wbar').forEach(b=>b.classList.remove('on'));
}

let _ttsU=null;
function vcSpeak(btn,text) {
  if (_ttsU) {
    speechSynthesis.cancel(); _ttsU=null;
    btn.innerHTML='<i class="fas fa-volume-up"></i> వినండి';
    btn.classList.remove('speaking'); return;
  }
  const u=new SpeechSynthesisUtterance(text);
  u.lang='te-IN'; u.rate=0.88; u.pitch=1;
  u.onend=()=>{ _ttsU=null; btn.innerHTML='<i class="fas fa-volume-up"></i> వినండి'; btn.classList.remove('speaking'); };
  speechSynthesis.speak(u);
  _ttsU=u;
  btn.innerHTML='<i class="fas fa-stop"></i> ఆపు';
  btn.classList.add('speaking');
}

function showPage(id,btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function callPhone() { if(CLIENT&&CLIENT.phone) window.location.href='tel:'+CLIENT.phone; }
function openWA()    { if(CLIENT&&CLIENT.whatsapp) window.open('https://wa.me/'+CLIENT.whatsapp,'_blank'); }
