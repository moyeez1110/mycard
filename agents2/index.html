<!DOCTYPE html>
<html lang="te">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Citizen Digital Seva</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════
   CONFIGURATION — Edit ONLY these 2 lines
   ═══════════════════════════════════════ */

/* ═══════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════ */
:root {
  --accent: #4fffb0;
  --accent-dim: #1adb7a;
  --bg: #0a0f1a;
  --bg2: #111827;
  --bg3: #1a2235;
  --card: #141e2e;
  --border: rgba(255,255,255,0.08);
  --text: #e8edf5;
  --text2: #8899aa;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --font-te: 'Noto Sans Telugu', sans-serif;
  --font: 'Inter', sans-serif;
  --trans: 0.25s cubic-bezier(0.19,1,0.22,1);
}

/* ═══════════════════════════════════════
   COLOR PALETTE FOR SERVICE CARDS
   ═══════════════════════════════════════ */
.gi-blue   { --ci: #60a5fa; --cb: rgba(96,165,250,0.12); }
.gi-green  { --ci: #34d399; --cb: rgba(52,211,153,0.12); }
.gi-orange { --ci: #fb923c; --cb: rgba(251,146,60,0.12); }
.gi-purple { --ci: #a78bfa; --cb: rgba(167,139,250,0.12); }
.gi-red    { --ci: #f87171; --cb: rgba(248,113,113,0.12); }
.gi-yellow { --ci: #fbbf24; --cb: rgba(251,191,36,0.12); }
.gi-pink   { --ci: #f472b6; --cb: rgba(244,114,182,0.12); }
.gi-teal   { --ci: #2dd4bf; --cb: rgba(45,212,191,0.12); }

/* ═══════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }
button { border: none; cursor: pointer; font-family: var(--font); }

/* ═══════════════════════════════════════
   LOADING SCREEN
   ═══════════════════════════════════════ */
#loading-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; transition: opacity 0.5s ease;
}
#loading-screen.hide { opacity: 0; pointer-events: none; }
.loader-ring {
  width: 52px; height: 52px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loader-text { color: var(--text2); font-size: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════
   POPUP / MODAL
   ═══════════════════════════════════════ */
#popup-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  animation: fadeIn 0.3s ease;
}
#popup-overlay.hidden { display: none; }
#popup-box {
  background: var(--bg2);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  max-width: 440px; width: 100%;
  box-shadow: 0 0 40px rgba(79,255,176,0.2);
  overflow: hidden;
  animation: slideUp 0.35s cubic-bezier(0.19,1,0.22,1);
}
#popup-img { width: 100%; max-height: 200px; object-fit: cover; display: none; }
#popup-img.show { display: block; }
.popup-body {
  padding: 24px;
  display: flex; flex-direction: column; gap: 12px;
}
.popup-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(79,255,176,0.12);
  color: var(--accent);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px; font-weight: 600;
  width: fit-content;
}
.popup-badge i { font-size: 10px; }
#popup-title {
  font-size: 18px; font-weight: 700;
  line-height: 1.4;
  font-family: var(--font-te);
}
#popup-subtitle {
  font-size: 14px; color: var(--text2);
  line-height: 1.6;
  font-family: var(--font-te);
}
#popup-close {
  background: var(--accent);
  color: #0a0f1a;
  border-radius: 8px;
  padding: 10px 20px;
  font-weight: 700; font-size: 14px;
  margin-top: 4px;
  transition: var(--trans);
}
#popup-close:hover { opacity: 0.85; transform: scale(0.98); }

/* ═══════════════════════════════════════
   TICKER BAR
   ═══════════════════════════════════════ */
#ticker-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  display: flex; align-items: center; gap: 12px;
  height: 38px; overflow: hidden;
  position: sticky; top: 0; z-index: 50;
}
.ticker-label {
  background: var(--accent);
  color: #0a0f1a;
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 11px; font-weight: 700;
  white-space: nowrap; flex-shrink: 0;
  letter-spacing: 0.5px;
}
.ticker-track {
  flex: 1; overflow: hidden; position: relative;
}
.ticker-inner {
  display: flex; gap: 48px;
  white-space: nowrap;
  will-change: transform;
}
.ticker-item {
  font-size: 13px; color: var(--text2);
  flex-shrink: 0; cursor: pointer;
  font-family: var(--font-te);
  transition: color var(--trans);
}
.ticker-item:hover { color: var(--accent); }

/* ═══════════════════════════════════════
   HEADER
   ═══════════════════════════════════════ */
#app-header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.header-brand {
  display: flex; align-items: center; gap: 12px;
}
.header-logo {
  width: 42px; height: 42px;
  background: rgba(79,255,176,0.12);
  border: 1.5px solid var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); font-size: 18px;
}
.header-name { font-size: 16px; font-weight: 700; font-family: var(--font-te); }
.header-tag  { font-size: 11px; color: var(--text2); margin-top: 1px; }
.header-actions { display: flex; gap: 8px; }
.hbtn {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--bg3);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  transition: var(--trans);
}
.hbtn:hover { background: var(--card); color: var(--text); }
.hbtn.active { background: rgba(79,255,176,0.12); color: var(--accent); }

/* ═══════════════════════════════════════
   PAGE ROUTER
   ═══════════════════════════════════════ */
.page { display: none; }
.page.active { display: block; }

/* ═══════════════════════════════════════
   HOME PAGE
   ═══════════════════════════════════════ */
#home { padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; }

/* Hero */
.hero-card {
  background: linear-gradient(135deg, var(--bg3) 0%, var(--card) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 24px;
  position: relative; overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
  opacity: 0.06; pointer-events: none;
}
.hero-greeting { font-size: 12px; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; }
.hero-name { font-size: 22px; font-weight: 700; font-family: var(--font-te); }
.hero-city { font-size: 13px; color: var(--accent); margin-top: 4px; }
.hero-actions { display: flex; gap: 10px; margin-top: 18px; }
.hero-btn {
  flex: 1; padding: 11px 16px;
  border-radius: 10px;
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: var(--trans);
}
.hero-btn.primary {
  background: var(--accent); color: #0a0f1a;
}
.hero-btn.primary:hover { opacity: 0.88; transform: scale(0.98); }
.hero-btn.secondary {
  background: var(--bg3); color: var(--text);
  border: 1px solid var(--border);
}
.hero-btn.secondary:hover { border-color: var(--accent); color: var(--accent); }

/* Section headings */
.section-head {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 14px;
}
.section-head h2 {
  font-size: 15px; font-weight: 700;
  font-family: var(--font-te);
}
.section-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
}

/* Update cards */
.updates-section { margin-bottom: 24px; }
.update-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: var(--trans);
}
.update-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.update-dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%; flex-shrink: 0;
  box-shadow: 0 0 6px var(--accent);
}
.update-title {
  flex: 1; font-size: 13px;
  font-family: var(--font-te);
  line-height: 1.5;
}
.update-arrow { color: var(--text2); font-size: 12px; }
.updates-show-more {
  width:100%; padding:10px; border-radius:10px;
  background:var(--bg3); border:1px solid var(--border);
  color:var(--text2); font-size:13px; font-family:var(--font-te);
  display:flex; align-items:center; justify-content:center; gap:6px;
  cursor:pointer; transition:var(--trans); margin-top:4px;
}
.updates-show-more:hover { border-color:var(--accent); color:var(--accent); }

/* Services grid */
.services-section { margin-bottom: 24px; }
.services-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.service-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; text-align: center;
  cursor: pointer;
  transition: var(--trans);
  min-height: 90px;
}
.service-card:hover {
  border-color: var(--ci, var(--accent));
  background: var(--cb, rgba(79,255,176,0.06));
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.service-icon {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--cb, rgba(79,255,176,0.12));
  color: var(--ci, var(--accent));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.service-name { font-size: 11px; color: var(--text2); font-family: var(--font-te); line-height: 1.3; }

/* ═══════════════════════════════════════
   DOCS PAGE
   ═══════════════════════════════════════ */
#docs-page { padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; }

/* PDF list */
.pdf-section { margin-bottom: 24px; }
.pdf-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: var(--trans);
}
.pdf-item:hover { border-color: #f87171; }
.pdf-icon-wrap {
  width: 36px; height: 36px;
  background: rgba(248,113,113,0.12);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #f87171; font-size: 16px; flex-shrink: 0;
}
.pdf-name { flex: 1; font-size: 13px; font-family: var(--font-te); }
.pdf-dl { color: var(--text2); font-size: 13px; }

/* Docs accordion */
.docs-list { display: flex; flex-direction: column; gap: 8px; }
.doc-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  display: flex; align-items: center; gap: 12px;
  font-family: var(--font-te);
  font-size: 13px;
}
.doc-check {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(79,255,176,0.12);
  border: 1.5px solid var(--accent);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent); font-size: 10px; flex-shrink: 0;
}

/* ═══════════════════════════════════════
   CONTACT PAGE
   ═══════════════════════════════════════ */
#contact-page { padding: 20px 16px 100px; max-width: 600px; margin: 0 auto; }

.contact-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 16px;
}
.contact-row {
  padding: 16px 20px;
  display: flex; align-items: center; gap: 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: var(--trans);
}
.contact-row:last-child { border-bottom: none; }
.contact-row:hover { background: var(--bg3); }
.contact-icon-wrap {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.contact-label { font-size: 11px; color: var(--text2); }
.contact-value { font-size: 14px; font-weight: 600; margin-top: 2px; }

.map-wrap {
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  height: 240px;
  margin-bottom: 16px;
}
.map-wrap iframe { width: 100%; height: 100%; border: none; }
.map-placeholder {
  width: 100%; height: 100%;
  background: var(--card);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: var(--text2);
}

/* ═══════════════════════════════════════
   BOTTOM NAV
   ═══════════════════════════════════════ */
#bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 0 0 env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; padding: 10px 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; color: var(--text2);
  background: transparent;
  font-size: 10px; font-weight: 600;
  font-family: var(--font-te);
  transition: var(--trans);
  letter-spacing: 0.3px;
}
.nav-btn i { font-size: 18px; }
.nav-btn.active { color: var(--accent); }
.nav-btn.active i { filter: drop-shadow(0 0 4px var(--accent)); }

/* ═══════════════════════════════════════
   FAB
   ═══════════════════════════════════════ */
#fab {
  position: fixed; bottom: 80px; right: 20px; z-index: 200;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--accent);
  color: #0a0f1a;
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(79,255,176,0.4);
  transition: var(--trans);
}
#fab:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(79,255,176,0.5); }

/* ═══════════════════════════════════════
   FOOTER
   ═══════════════════════════════════════ */
.page-footer {
  text-align: center;
  padding: 20px 16px;
  color: var(--text2);
  font-size: 12px;
  border-top: 1px solid var(--border);
  margin-top: 16px;
}

/* ═══════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════ */
@keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

/* ═══════════════════════════════════════
   ERROR BANNER
   ═══════════════════════════════════════ */
#error-banner {
  display: none;
  background: rgba(248,113,113,0.12);
  border: 1px solid rgba(248,113,113,0.3);
  border-radius: 10px;
  padding: 12px 16px;
  margin: 16px;
  color: #f87171;
  font-size: 13px;
  font-family: var(--font-te);
}
#error-banner.show { display: block; }

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media(min-width:640px) {
  .services-grid { grid-template-columns: repeat(4, 1fr); }
}

/* ═══════════════════════════════════════
   VOICE PAGE — WhatsApp chat style
   ═══════════════════════════════════════ */
#voice-page { padding: 16px 16px 100px; max-width: 600px; margin: 0 auto; }

.voice-chat { display: flex; flex-direction: column; gap: 14px; }

/* Incoming bubble — Audio file (left) */
.vc-in { display: flex; flex-direction: column; align-items: flex-start; max-width: 88%; }
.vc-in .vbubble {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px 14px 14px 14px;
  padding: 10px 14px;
  width: 100%;
}

/* Outgoing bubble — TTS text (right) */
.vc-out {
  display: flex; flex-direction: column;
  align-items: flex-end; max-width: 88%;
  align-self: flex-end;
}
.vc-out .vbubble {
  background: rgba(79,255,176,0.08);
  border: 1px solid rgba(79,255,176,0.2);
  border-radius: 14px 4px 14px 14px;
  padding: 12px 14px;
  width: 100%;
}

.vc-sender { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
.vc-title { font-size: 12px; color: var(--text2); font-family: var(--font-te); margin-bottom: 8px; }

/* Audio player */
.vc-controls { display: flex; align-items: center; gap: 10px; }
.vc-play-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--accent); color: #0a0f1a;
  font-size: 13px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: var(--trans);
}
.vc-play-btn:hover { opacity: 0.85; }
.vc-play-btn.playing {
  background: transparent;
  color: var(--accent);
  border: 1.5px solid var(--accent);
}

.vc-wave { flex: 1; height: 28px; display: flex; align-items: center; gap: 2.5px; }
.wbar { width: 3px; border-radius: 3px; background: var(--text2); }
.wbar.on { background: var(--accent); animation: wPulse 0.65s ease-in-out infinite alternate; }
@keyframes wPulse { from { height: 4px; } to { height: 22px; } }

.vc-dur { font-size: 11px; color: var(--text2); min-width: 34px; text-align: right; }

/* TTS text bubble */
.tts-body { font-size: 13px; font-family: var(--font-te); line-height: 1.65; color: var(--text); margin-bottom: 10px; }
.tts-speak-btn {
  background: var(--bg3); border: 1px solid rgba(79,255,176,0.4);
  color: var(--accent); border-radius: 20px; padding: 5px 14px;
  font-size: 12px; font-family: var(--font-te);
  display: inline-flex; align-items: center; gap: 6px;
  transition: var(--trans);
}
.tts-speak-btn:hover { background: rgba(79,255,176,0.08); }
.tts-speak-btn.speaking { background: rgba(79,255,176,0.15); border-color: var(--accent); }

.vc-time { font-size: 10px; color: var(--text2); margin-top: 6px; text-align: right; }

.vc-empty { text-align: center; color: var(--text2); font-size: 13px;
  font-family: var(--font-te); padding: 50px 20px; }
.vc-empty i { font-size: 34px; margin-bottom: 12px; display: block; opacity: 0.35; }
</style>
</head>
<body>

<!-- ════════════════════ LOADING ════════════════════ -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <span class="loader-text">లోడ్ అవుతోంది…</span>
</div>

<!-- ════════════════════ POPUP ════════════════════ -->
<div id="popup-overlay" class="hidden">
  <div id="popup-box">
    <img id="popup-img" src="" alt="popup"/>
    <div class="popup-body">
      <span class="popup-badge"><i class="fas fa-bell"></i> ప్రకటన</span>
      <div id="popup-title"></div>
      <div id="popup-subtitle"></div>
      <button id="popup-close">అర్థమైంది ✓</button>
    </div>
  </div>
</div>

<!-- ════════════════════ TICKER ════════════════════ -->
<div id="ticker-bar">
  <span class="ticker-label">📢 LIVE</span>
  <div class="ticker-track">
    <div class="ticker-inner" id="ticker-inner">
      <span class="ticker-item">లోడ్ అవుతోంది…</span>
    </div>
  </div>
</div>

<!-- ════════════════════ HEADER ════════════════════ -->
<header id="app-header">
  <div class="header-brand">
    <div class="header-logo"><i id="hdr-icon" class="fas fa-landmark"></i></div>

<!-- ════════════════════ SCRIPT ════════════════════ -->
<script>
/* ═══════════════════════════════════════════════════
   ⚙️  CONFIGURATION — ONLY THIS 1 LINE TO CHANGE
   ═══════════════════════════════════════════════════
   SHEET_URL → మీ Google Sheet లో ఆ agent Tab యొక్క
               published CSV URL పెట్టండి.

   ఎలా తీయాలి:
   Sheet → File → Share → Publish to web
   → ఆ agent tab select చేయండి → CSV → Publish
   → ఆ URL ఇక్కడ పెట్టండి.

   కొత్త client కి: ఆ client tab URL మాత్రమే మార్చండి.
   ═══════════════════════════════════════════════════ */
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQgCCtcdcRdQYX3Zdhdc_BDmZPU2tw6tKUaUmuH8w_LobsbEOXq1LK0kbNSiPSNu0Lst1J_gKX-_GPl/pub?gid=0&single=true&output=csv';

/* ═══════════════════════════════════════════════════
   GLOBAL STATE
   ═══════════════════════════════════════════════════ */
let CLIENT = null;

/* ═══════════════════════════════════════════════════
   CSV PARSER
   ═══════════════════════════════════════════════════ */
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = splitCSVLine(lines[i]);
    const row = {};
    headers.forEach((h, idx) => { row[h.trim()] = (vals[idx] || '').trim(); });
    rows.push(row);
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}

/* ═══════════════════════════════════════════════════
   BUILD CLIENT OBJECT FROM CSV ROWS
   (Tab లో అన్ని rows ఆ agent వే — filter అక్కర్లేదు)
   ═══════════════════════════════════════════════════ */
function buildClient(rows) {
  if (!rows.length) return null;

  const kv = {};
  const updates  = [];
  const services = [];
  const pdfs     = [];
  const docs     = [];
  const tickers  = [];   // ← NEW: separate ticker content
  const voices   = [];   // ← NEW: audio file announcements
  const ttsItems = [];   // ← NEW: text-to-speech items

  rows.forEach(r => {
    const key = (r.key || '').trim();
    if (!key) return;

    if (key === 'update') {
      updates.push({ title: r.title || r.value, link: r.link || '#' });
    } else if (key === 'service') {
      services.push({
        title: r.title || r.value,
        page:  r.link  || '#',
        icon:  r.icon  || 'fas fa-star',
        color: r.extra || 'gi-blue',
      });
    } else if (key === 'pdf') {
      pdfs.push({ title: r.title || r.value, link: r.link || '#' });
    } else if (key === 'doc') {
      docs.push(r.value || r.title);
    } else if (key === 'ticker') {
      tickers.push(r.value || r.title);          // ← ticker scroll items
    } else if (key === 'voice') {
      voices.push({ title: r.title || r.value, link: r.link || '', date: r.extra || '' });
    } else if (key === 'tts') {
      ttsItems.push({ text: r.value || r.title, label: r.title || '', date: r.extra || '' });
    } else {
      kv[key] = r.value;
    }
  });

  return {
    shopName:    kv.shopName    || 'Seva Kendra',
    tagline:     kv.tagline     || '',
    logoIcon:    kv.logoIcon    || 'fas fa-landmark',
    accentColor: kv.accentColor || '#4fffb0',
    city:        kv.city        || '',
    phone:       kv.phone       || '',
    whatsapp:    kv.whatsapp    || '',
    mapEmbedUrl: kv.mapEmbedUrl || '',
    footerText:  kv.footerText  || '',
    popup: {
      show:     kv.popup_show === 'true',
      title:    kv.popup_title    || '',
      subtitle: kv.popup_subtitle || '',
      imageUrl: kv.popup_imageUrl || '',
    },
    updates,
    services,
    pdfs,
    docs,
    tickers,
    voices,
    ttsItems,
  };
}

/* ═══════════════════════════════════════════════════
   FETCH DATA FROM GOOGLE SHEET (UTF-8 Telugu fix)
   ═══════════════════════════════════════════════════ */
async function loadData() {
  try {
    const res = await fetch(SHEET_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);

    // Telugu UTF-8 సరిగ్గా చదవడానికి ArrayBuffer decode
    const buf     = await res.arrayBuffer();
    const decoder = new TextDecoder('utf-8');
    let text      = decoder.decode(buf);

    // BOM తీసేయండి (Excel export చేస్తే వస్తుంది)
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

    const rows = parseCSV(text);
    CLIENT = buildClient(rows);
    if (!CLIENT) throw new Error('No data in sheet');
    renderAll();
  } catch (e) {
    console.error('Sheet fetch error:', e);
    document.getElementById('error-banner').classList.add('show');
    document.getElementById('loading-screen').classList.add('hide');
  }
}

/* ═══════════════════════════════════════════════════
   RENDER FUNCTIONS
   ═══════════════════════════════════════════════════ */
function renderAll() {
  applyTheme();
  renderHeader();
  renderTicker();
  renderHero();
  renderUpdates();
  renderServices();
  renderPDFs();
  renderDocs();
  renderContact();
  renderFooter();
  renderVoice();   // ← NEW
  showPopup();
  hideLoader();
}

function applyTheme() {
  document.documentElement.style.setProperty('--accent', CLIENT.accentColor);
  // Derive dim accent (darken 15%)
  document.documentElement.style.setProperty('--accent-dim', CLIENT.accentColor);
}

function renderHeader() {
  document.getElementById('hdr-icon').className = CLIENT.logoIcon;
  document.getElementById('hdr-name').textContent = CLIENT.shopName;
  document.getElementById('hdr-tag').textContent  = CLIENT.tagline;

  document.getElementById('fab-wa').href   = `https://wa.me/${CLIENT.whatsapp}`;
  document.getElementById('fab').href      = `https://wa.me/${CLIENT.whatsapp}`;
  document.title = CLIENT.shopName;
}

let _tickerRAF = null, _tickerX = 0, _tickerPaused = false;

function renderTicker() {
  const inner = document.getElementById('ticker-inner');
  const track = inner.parentElement;
  const PX_PER_SEC = 80; // ← speed మార్చాలంటే ఇక్కడ (80=default, 120=fast, 50=slow)

  const src = (CLIENT.tickers && CLIENT.tickers.length)
    ? CLIENT.tickers
    : [`స్వాగతం — ${CLIENT.shopName}`];

  // 4 copies — mobile లో కూడా seamless loop
  const copies = [...src, ...src, ...src, ...src];
  inner.innerHTML = copies.map(t =>
    `<span class="ticker-item">📢 ${t}</span>`
  ).join('<span style="color:var(--border);margin:0 12px">•</span>');

  requestAnimationFrame(() => {
    const halfW = inner.scrollWidth / 2;
    let last = null;
    _tickerX = 0;
    if (_tickerRAF) cancelAnimationFrame(_tickerRAF);
    function step(ts) {
      if (last !== null && !_tickerPaused) {
        _tickerX += PX_PER_SEC * (ts - last) / 1000;
        if (_tickerX >= halfW) _tickerX -= halfW;
        inner.style.transform = `translateX(-${_tickerX}px)`;
      }
      last = ts;
      _tickerRAF = requestAnimationFrame(step);
    }
    _tickerRAF = requestAnimationFrame(step);
  });

  track.addEventListener('mouseenter', () => { _tickerPaused = true; });
  track.addEventListener('mouseleave', () => { _tickerPaused = false; });
  track.addEventListener('touchstart', () => { _tickerPaused = true; }, {passive:true});
  track.addEventListener('touchend', () => { setTimeout(() => { _tickerPaused = false; }, 1200); }, {passive:true});
}

function renderHero() {
  document.getElementById('hero-shop-name').textContent = CLIENT.shopName;
  document.getElementById('hero-city').textContent      = CLIENT.city ? `📍 ${CLIENT.city}` : '';
}

function renderUpdates() {
  const list    = document.getElementById('updates-list');
  const updates = CLIENT.updates || [];
  if (!updates.length) {
    list.innerHTML = `<div style="color:var(--text2);font-size:13px;padding:12px 0;font-family:var(--font-te)">తాజా అప్‌డేట్లు లేవు</div>`;
    return;
  }
  const LIMIT = 10;
  const card = u => `
    <div class="update-card" onclick="safeOpen('${u.link}')">
      <div class="update-dot"></div>
      <div class="update-title">${u.title}</div>
      <i class="fas fa-chevron-right update-arrow"></i>
    </div>`;

  if (updates.length <= LIMIT) {
    list.innerHTML = updates.map(card).join('');
    return;
  }
  const visible = updates.slice(0, LIMIT);
  const extra   = updates.slice(LIMIT);
  list.innerHTML = visible.map(card).join('') + `
    <div id="updates-more-wrap" style="display:none">
      <div style="max-height:340px;overflow-y:auto;scrollbar-width:thin;
        scrollbar-color:var(--border) transparent;border-radius:10px;
        border:1px solid var(--border);margin-top:4px;padding:6px 0;">
        ${extra.map(card).join('')}
      </div>
    </div>
    <button class="updates-show-more" id="updates-toggle-btn"
      onclick="toggleMoreUpdates(${extra.length})">
      <i class="fas fa-chevron-down"></i> మరింత చూడండి (${extra.length} అప్‌డేట్లు)
    </button>`;
}

function toggleMoreUpdates(count) {
  const wrap = document.getElementById('updates-more-wrap');
  const btn  = document.getElementById('updates-toggle-btn');
  const open = wrap.style.display === 'block';
  wrap.style.display = open ? 'none' : 'block';
  btn.innerHTML = open
    ? `<i class="fas fa-chevron-down"></i> మరింత చూడండి (${count} అప్‌డేట్లు)`
    : `<i class="fas fa-chevron-up"></i> తక్కువ చూడండి`;
}

}

/* ═══════════════════════════════════════════════════
   VOICE — WhatsApp style chat bubbles
   ═══════════════════════════════════════════════════ */
function renderVoice() {
  const chat = document.getElementById('voice-chat');
  const voices   = CLIENT.voices   || [];
  const ttsItems = CLIENT.ttsItems || [];

  if (!voices.length && !ttsItems.length) return; // keep placeholder

  const today = new Date().toLocaleDateString('te-IN', { day:'2-digit', month:'short' });
  let html = '';

  // Audio file bubbles — left (incoming)
  voices.forEach((v, i) => {
    const id = 'vc_' + i;
    const bars = Array.from({length:14}, (_, b) =>
      `<div class="wbar" style="height:${4 + [6,12,18,8,20,10,16,5,14,9,17,7,13,11][b]}px;animation-delay:${b*0.055}s"></div>`
    ).join('');
    html += `
      <div class="vc-in">
        <div class="vc-sender"><i class="fas fa-headphones" style="margin-right:4px"></i>వాయిస్ అనౌన్స్‌మెంట్</div>
        <div class="vbubble">
          <div class="vc-title">${v.title || 'Audio Message'}</div>
          <div class="vc-controls">
            <button class="vc-play-btn" id="pb_${id}" onclick="vcToggle('${id}',this)">
              <i class="fas fa-play"></i>
            </button>
            <div class="vc-wave" id="wv_${id}">${bars}</div>
            <span class="vc-dur" id="du_${id}">0:00</span>
          </div>
          <audio id="${id}" src="${v.link}" preload="metadata"></audio>
          <div class="vc-time">${v.date || today} <i class="fas fa-check-double" style="color:var(--accent);margin-left:4px"></i></div>
        </div>
      </div>`;
  });

  // TTS bubbles — right (outgoing)
  ttsItems.forEach((t, i) => {
    const safe = t.text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    html += `
      <div class="vc-out">
        <div class="vbubble">
          <div class="tts-body">${t.text}</div>
          <button class="tts-speak-btn" id="ts_${i}" onclick="vcSpeak(this,'${safe}')">
            <i class="fas fa-volume-up"></i> వినండి
          </button>
          <div class="vc-time">${t.date || today} <i class="fas fa-check-double" style="color:var(--accent);margin-left:4px"></i></div>
        </div>
      </div>`;
  });

  chat.innerHTML = html;

  // Wire up audio metadata
  voices.forEach((v, i) => {
    const id  = 'vc_' + i;
    const aud = document.getElementById(id);
    if (!aud) return;
    const dur = document.getElementById('du_' + id);
    const fmt = s => `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
    aud.addEventListener('loadedmetadata', () => { if (aud.duration) dur.textContent = fmt(aud.duration); });
    aud.addEventListener('timeupdate', () => { dur.textContent = fmt(aud.currentTime); });
    aud.addEventListener('ended', () => vcReset(id));
  });
}

/* Audio player controls */
let _vcAud = null, _vcAudId = null;

function vcToggle(id, btn) {
  const aud  = document.getElementById(id);
  const wave = document.getElementById('wv_' + id);
  if (_vcAud && _vcAud !== aud) { _vcAud.pause(); _vcAud.currentTime = 0; vcReset(_vcAudId); }
  if (aud.paused) {
    aud.play().catch(()=>{});
    btn.innerHTML = '<i class="fas fa-pause"></i>';
    btn.classList.add('playing');
    wave.querySelectorAll('.wbar').forEach(b => b.classList.add('on'));
    _vcAud = aud; _vcAudId = id;
  } else {
    aud.pause();
    vcReset(id);
  }
}
function vcReset(id) {
  const btn  = document.getElementById('pb_' + id);
  const wave = document.getElementById('wv_' + id);
  if (btn)  { btn.innerHTML = '<i class="fas fa-play"></i>'; btn.classList.remove('playing'); }
  if (wave) wave.querySelectorAll('.wbar').forEach(b => b.classList.remove('on'));
}

/* TTS controls */
let _ttsU = null;
function vcSpeak(btn, text) {
  if (_ttsU) {
    speechSynthesis.cancel();
    _ttsU = null;
    btn.innerHTML = '<i class="fas fa-volume-up"></i> వినండి';
    btn.classList.remove('speaking');
    return;
  }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'te-IN'; u.rate = 0.88; u.pitch = 1;
  u.onend = () => {
    _ttsU = null;
    btn.innerHTML = '<i class="fas fa-volume-up"></i> వినండి';
    btn.classList.remove('speaking');
  };
  speechSynthesis.speak(u);
  _ttsU = u;
  btn.innerHTML = '<i class="fas fa-stop"></i> ఆపు';
  btn.classList.add('speaking');
}

/* ═══════════════════════════════════════════════════
   NAVIGATION
   ═══════════════════════════════════════════════════ */
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (btn) btn.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═══════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════ */
function safeOpen(url) {
  if (url && url !== '#') window.open(url, '_blank');
}
function callPhone() {
  if (CLIENT && CLIENT.phone) window.location.href = `tel:${CLIENT.phone}`;
}
function openWA() {
  if (CLIENT && CLIENT.whatsapp) window.open(`https://wa.me/${CLIENT.whatsapp}`, '_blank');
}

/* ═══════════════════════════════════════════════════
   POPUP CLOSE
   ═══════════════════════════════════════════════════ */
document.getElementById('popup-close').onclick = () => {
  document.getElementById('popup-overlay').classList.add('hidden');
};
document.getElementById('popup-overlay').onclick = (e) => {
  if (e.target === document.getElementById('popup-overlay'))
    document.getElementById('popup-overlay').classList.add('hidden');
};

/* ═══════════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════════ */
loadData();
</script>
